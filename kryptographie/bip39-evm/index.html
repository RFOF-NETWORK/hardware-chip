<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>BIP39 & EVM Engine</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; padding: 5%; }
        .box { background: #161b22; padding: 25px; border-radius: 8px; border: 1px solid #30363d; max-width: 750px; margin: auto; }
        input, button { background: #21262d; color: #fff; border: 1px solid #30363d; padding: 12px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-family: monospace; }
        button { background: #238636; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #2ea043; }
        .output-label { font-weight: bold; color: #58a6ff; margin-top: 15px; display: block; }
        .console { background: #000; padding: 15px; border-radius: 4px; border: 1px solid #30363d; word-break: break-all; color: #7ee787; min-height: 40px; margin-top: 5px; }
        .back { color: #58a6ff; text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <a class="back" href="../../index.html">🏠 Zurück zum Hauptmenü</a>
        <h2>BIP39 Seed & EVM Adressgenerator</h2>
        <p>Generiert deterministische Schlüssel direkt im Browser-Speicher.</p>
        
        <label>Geben Sie Ihr geheimes Wort / Entropie ein:</label>
        <input type="text" id="seedInput" value="quantenresistenter elite monolith code 2026">
        
        <button onclick="generateWeb3Keys()">Schlüsselbund atomar ableiten</button>
        
        <span class="output-label">Simulierter BIP39 Mnemonic Seed (Auswahl):</span>
        <div class="console" id="bip39Output">Bereit...</div>
        
        <span class="output-label">Abgeleitete EVM (Ethereum) Adresse:</span>
        <div class="console" id="evmOutput">Bereit...</div>
    </div>

    <script>
        async function generateWeb3Keys() {
            const input = document.getElementById('seedInput').value;
            const encoder = new TextEncoder();
            const data = encoder.encode(input);
            
            // Verwende SHA-256 als kryptografische Hash-Funktion (Kernelement für BIP32/39)
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const fullHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            // Simuliere BIP39 Wortzuordnung basierend auf der Entropie des Hashes
            const wordList = ["alpha", "atomar", "crypto", "elite", "genesis", "hardware", "matrix", "monolith", "omega", "quantum", "silicon", "vector"];
            let mnemonic = [];
            for(let i = 0; i < 12; i++) {
                let index = (hashArray[i % hashArray.length] + i) % wordList.length;
                mnemonic.push(wordList[index]);
            }
            
            // Erzeuge eine valide strukturierte 20-Byte EVM Hex-Adresse aus dem Hash
            const evmAddress = "0x" + fullHash.substring(0, 40);
            
            document.getElementById('bip39Output').innerText = mnemonic.join(" ");
            document.getElementById('evmOutput').innerText = evmAddress;
        }
    </script>
</body>
</html>
